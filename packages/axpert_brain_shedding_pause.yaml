# =====================================================================
# AXPERT BRAIN — Pause délestage/restauration avec minuteur
#
# Un bouton sur le dashboard : appuie dessus pour mettre en pause le
# DÉLESTAGE (nouvelles coupures) pendant la durée réglée (input_number,
# 1-60 min). Ré-appuie pendant la pause -> relance le minuteur à zéro.
# Écoulement du temps -> reprise automatique, rien à réactiver
# manuellement.
#
# Pause = bloque uniquement les NOUVELLES coupures (tier1/tier2/tier3).
# La restauration réactive reste TOUJOURS autorisée, pause ou pas —
# comportement le plus sûr pour le frigo (jamais bloquer un rallumage
# légitime). C'est le comportement réellement codé dans
# axpert_brain_shedding.yaml.
# =====================================================================

input_button:

  axpert_pause_shedding:
    name: Axpert Pause Délestage
    icon: mdi:pause-circle-outline

input_number:

  axpert_shedding_pause_minutes:
    name: Axpert Durée de la pause (minutes)
    icon: mdi:timer-cog-outline
    min: 1
    max: 60
    step: 1
    initial: 60
    mode: slider

timer:

  axpert_shedding_pause:
    name: Axpert Pause Délestage
    restore: false

automation:

  - alias: "Axpert Brain — Démarrer/relancer la pause délestage"
    id: axpert_brain_start_shedding_pause
    mode: single

    triggers:
      - trigger: state
        entity_id: input_button.axpert_pause_shedding

    actions:
      - action: timer.start
        target:
          entity_id: timer.axpert_shedding_pause
        data:
          duration: "{{ (states('input_number.axpert_shedding_pause_minutes')|float(60) * 60)|int }}"
      - action: persistent_notification.create
        data:
          title: "⏸️ Axpert — Délestage en pause"
          message: >
            Le délestage automatique est en pause pour
            {{ states('input_number.axpert_shedding_pause_minutes')|int }} minutes.
            Reprise automatique à la fin, ou ré-appuie sur le bouton pour prolonger.
          notification_id: axpert_shedding_pause