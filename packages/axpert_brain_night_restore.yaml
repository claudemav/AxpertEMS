# =====================================================================
# AXPERT BRAIN — Maintien nocturne du frigo (rallumage à toute heure de
# nuit s'il s'éteint, comportement VOULU — pas juste "restauration 23h")
# =====================================================================

automation:

  - alias: "Axpert Brain — Maintien nocturne du frigo"
    id: axpert_brain_night_restore
    mode: single

    triggers:
      - trigger: time_pattern
        minutes: "/1"

    conditions:
      - condition: template
        value_template: >
          {{ ['sensor.axpert_battery_capacity_filtered']
             | map('states')
             | select('in', ['unavailable', 'unknown', none])
             | list | length == 0 }}
      - condition: template
        value_template: >
          {% set raw = states('sensor.debarras_maison_axpert_config_night_start') %}
          {% set night_start_str = raw if raw not in ['unknown', 'unavailable', none, ''] else '23:00' %}
          {% set night_start = strptime(night_start_str, '%H:%M').time() %}
          {% set sun_below = is_state('sun.sun', 'below_horizon') %}
          {{ now().time() >= night_start
             or (sun_below and now().time() < strptime('12:00', '%H:%M').time()) }}
      - condition: numeric_state
        entity_id: sensor.axpert_battery_capacity_filtered
        above: sensor.debarras_maison_axpert_config_soc_threshold
      - condition: state
        entity_id: switch.frigo
        state: "off"
      - condition: state
        entity_id: input_boolean.axpert_manual_lock_frigo
        state: "off"
      - condition: template
        value_template: "{{ not is_state('timer.axpert_shedding_pause', 'active') }}"

    actions:
      - delay: "00:01:00"
      - condition: template
        value_template: >
          {{ ['sensor.axpert_battery_capacity_filtered']
             | map('states')
             | select('in', ['unavailable', 'unknown', none])
             | list | length == 0 }}
      - condition: numeric_state
        entity_id: sensor.axpert_battery_capacity_filtered
        above: sensor.debarras_maison_axpert_config_soc_threshold
      - condition: state
        entity_id: switch.frigo
        state: "off"
      - condition: state
        entity_id: input_boolean.axpert_manual_lock_frigo
        state: "off"
      - condition: template
        value_template: "{{ not is_state('timer.axpert_shedding_pause', 'active') }}"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.axpert_command_in_progress_frigo
      - action: switch.turn_on
        target:
          entity_id: switch.frigo
      - delay: "00:00:03"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.axpert_command_in_progress_frigo